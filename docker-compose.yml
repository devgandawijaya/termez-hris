version: "3.9"

services:
  frontend:
    # build the production-ready static bundle using the existing Dockerfile
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"           # expose nginx on host port 80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # optional development service running Vite
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app:cached
      - /app/node_modules
    ports:
      - "5173:5173"        # Vite default port
    environment:
      - NODE_ENV=development
    command: sh -c "npm ci && npm run dev"
    depends_on:
      - frontend
